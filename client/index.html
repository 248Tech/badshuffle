<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BadShuffle — Event Rental Management</title>
    <meta name="description" content="BadShuffle — inventory and quoting tool for event rental businesses." />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Open Graph fallback (catalog pages override these dynamically) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BadShuffle" />
    <meta property="og:description" content="Event rental inventory and quoting." />
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="alternate icon" href="/favicon.svg?v=2" />
    <!-- Apply saved UI theme before React renders to prevent flash -->
    <script>(function(){var t=localStorage.getItem('bs_theme');if(t&&t!=='default')document.documentElement.setAttribute('data-theme',t);})();</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
