services:
  badshuffle:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_PATH: /data/badshuffle.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - badshuffle_data:/data
    restart: "no"

volumes:
  badshuffle_data:
