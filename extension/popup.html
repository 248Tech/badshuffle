<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BadShuffle Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #0d3b52;
      color: #fff;
    }

    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo { font-size: 20px; }
    .title { font-size: 16px; font-weight: 700; }
    .subtitle { font-size: 11px; opacity: .6; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .status-card {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
    }
    .status-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .6;
      margin-bottom: 6px;
    }
    .status-value {
      font-size: 13px;
      font-weight: 500;
    }
    .stat-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 8px;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: #16b2a5;
    }
    .stat-lbl { font-size: 10px; opacity: .7; text-align: center; }

    .error { color: #fc8181; font-size: 12px; }
    .success { color: #68d391; font-size: 12px; }

    .open-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #1a8fc1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .open-btn:hover { background: #1577a3; }

    .instructions {
      font-size: 11px;
      opacity: .55;
      line-height: 1.5;
      text-align: center;
    }

    /* Connect section */
    .connect-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .connect-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .6;
    }
    .connect-desc { font-size: 12px; opacity: .7; line-height: 1.4; }
    .token-input {
      width: 100%;
      padding: 7px 9px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #fff;
      font-size: 12px;
      font-family: monospace;
    }
    .token-input::placeholder { opacity: .4; }
    .token-input:focus { outline: none; border-color: #1a8fc1; }
    .save-btn {
      padding: 7px 12px;
      background: #16b2a5;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .save-btn:hover { background: #11998e; }
    .connected-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .connected-badge {
      font-size: 12px;
      color: #68d391;
      font-weight: 600;
    }
    .disconnect-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .disconnect-btn:hover { color: #fc8181; border-color: #fc8181; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔀</div>
    <div>
      <div class="title">BadShuffle Sync</div>
      <div class="subtitle">Goodshuffle → BadShuffle</div>
    </div>
  </div>

  <div class="body">
    <!-- Token connect section -->
    <div class="connect-card" id="connectCard">
      <div class="connect-title">API Token</div>
      <div id="connectForm">
        <div class="connect-desc">Paste your extension token from the BadShuffle Extension page.</div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <input class="token-input" id="tokenInput" type="text" placeholder="Paste token here…" />
          <button class="save-btn" id="saveBtn">Save</button>
        </div>
        <div id="connectMsg" style="margin-top:6px"></div>
      </div>
      <div id="connectedRow" class="connected-row" style="display:none">
        <span class="connected-badge">✓ Connected</span>
        <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
      </div>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-label">Last Sync</div>
      <div class="status-value" id="statusValue">Checking…</div>
      <div class="stat-row" id="statRow" style="display:none">
        <div class="stat">
          <span class="stat-num" id="statItems">0</span>
          <span class="stat-lbl">Items</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="statNew">0</span>
          <span class="stat-lbl">New</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="statUpdated">0</span>
          <span class="stat-lbl">Updated</span>
        </div>
      </div>
    </div>

    <a href="http://localhost:5173" target="_blank" class="open-btn">
      Open BadShuffle →
    </a>

    <p class="instructions">
      Visit any Goodshuffle quote or catalog page. Items will sync automatically to your local inventory.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
